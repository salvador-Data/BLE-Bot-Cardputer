; BLE Bot — authorized BLE scout for M5Stack Cardputer
; Build:  cd platformio && pio run -e m5stack-cardputer
; Flash:  pio run -e m5stack-cardputer -t upload
; Binary: .pio/build/m5stack-cardputer/firmware.bin → data/firmware/ble_bot.bin

[env:m5stack-cardputer]
platform = espressif32 @ ^6.9.0
board = esp32-s3-devkitc-1
board_build.mcu = esp32s3
board_build.flash_size = 8MB
board_upload.flash_size = 8MB
board_build.partitions = default_8MB.csv
framework = arduino
monitor_speed = 115200
upload_speed = 1500000
build_flags =
    -std=gnu++17
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DBLE_SCAN_SECONDS=5
    -DBLE_REFRESH_MS=8000
lib_deps =
    m5stack/M5Cardputer@^1.0.2
